<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 650" width="950" height="650">
  <defs>
    <marker id="arrowSolid" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <style>
    .box-text { font-family: monospace; font-size: 14px; fill: #222; text-anchor: middle; dominant-baseline: central; }
    .label-text { font-family: sans-serif; font-size: 11px; fill: #555; text-anchor: middle; dominant-baseline: central; }
    .note-text { font-family: sans-serif; font-size: 11px; fill: #444; }
    .layer-label { font-family: sans-serif; font-size: 11px; fill: #888; text-anchor: end; dominant-baseline: central; }
  </style>

  <!-- Background -->
  <rect width="950" height="650" fill="#fafafa" rx="8"/>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Layer 1: Governance Executor -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <rect x="340" y="30" width="270" height="44" rx="8" fill="#e8f4fd" stroke="#7bb8db" stroke-width="1.5"/>
  <text x="475" y="52" class="box-text">Governance Executor</text>

  <!-- Arrow: Executor → Payload (solid = CALL) -->
  <line x1="475" y1="74" x2="475" y2="126" stroke="#333" stroke-width="1.5" marker-end="url(#arrowSolid)"/>
  <text x="498" y="100" class="label-text">CALL</text>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Layer 2: AaveV4Payload -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <rect x="340" y="130" width="270" height="44" rx="8" fill="#fff3cd" stroke="#d4a843" stroke-width="1.5"/>
  <text x="475" y="152" class="box-text">AaveV4Payload</text>
  <text x="475" y="167" class="label-text" font-style="italic" font-size="10">(abstract — inherits)</text>

  <!-- Arrow: Payload → ConfigEngine (dashed = DELEGATECALL) -->
  <line x1="475" y1="174" x2="475" y2="230" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>
  <text x="520" y="204" class="label-text">DELEGATECALL</text>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Layer 3: AaveV4ConfigEngine -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <rect x="320" y="234" width="310" height="44" rx="8" fill="#d4edda" stroke="#72b07e" stroke-width="1.5"/>
  <text x="475" y="256" class="box-text">AaveV4ConfigEngine</text>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Branching arrows: ConfigEngine → 4 sub-engines (dashed = DELEGATECALL) -->
  <!-- Column centers: 120, 340, 570, 810 -->
  <!-- ════════════════════════════════════════════════════════════ -->

  <!-- Branch lines from ConfigEngine bottom-center to each sub-engine -->
  <!-- HubEngine (col 1) -->
  <path d="M 475 278 L 475 310 L 120 310 L 120 360" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>
  <text x="270" y="305" class="label-text">DELEGATECALL</text>

  <!-- SpokeEngine (col 2) -->
  <path d="M 475 278 L 475 330 L 340 330 L 340 360" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>

  <!-- AccessManagerEngine (col 3) -->
  <path d="M 475 278 L 475 330 L 570 330 L 570 360" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>

  <!-- PositionManagerEngine (col 4) -->
  <path d="M 475 278 L 475 310 L 810 310 L 810 360" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>
  <text x="670" y="305" class="label-text">DELEGATECALL</text>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Layer 4: Sub-engines -->
  <!-- ════════════════════════════════════════════════════════════ -->

  <!-- HubEngine -->
  <rect x="40" y="364" width="160" height="44" rx="8" fill="#f8d7da" stroke="#d48a90" stroke-width="1.5"/>
  <text x="120" y="386" class="box-text">HubEngine</text>

  <!-- SpokeEngine -->
  <rect x="255" y="364" width="170" height="44" rx="8" fill="#f8d7da" stroke="#d48a90" stroke-width="1.5"/>
  <text x="340" y="386" class="box-text">SpokeEngine</text>

  <!-- AccessManagerEngine -->
  <rect x="470" y="364" width="200" height="44" rx="8" fill="#f8d7da" stroke="#d48a90" stroke-width="1.5"/>
  <text x="570" y="386" class="box-text">AccessManagerEngine</text>

  <!-- PositionManagerEngine -->
  <rect x="710" y="364" width="200" height="44" rx="8" fill="#f8d7da" stroke="#d48a90" stroke-width="1.5"/>
  <text x="810" y="386" class="box-text">PositionManagerEngine</text>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Arrows: Sub-engines → External contracts (solid = CALL) -->
  <!-- ════════════════════════════════════════════════════════════ -->

  <line x1="120" y1="408" x2="120" y2="478" stroke="#333" stroke-width="1.5" marker-end="url(#arrowSolid)"/>
  <text x="143" y="446" class="label-text">CALL</text>

  <line x1="340" y1="408" x2="340" y2="478" stroke="#333" stroke-width="1.5" marker-end="url(#arrowSolid)"/>
  <text x="363" y="446" class="label-text">CALL</text>

  <line x1="570" y1="408" x2="570" y2="478" stroke="#333" stroke-width="1.5" marker-end="url(#arrowSolid)"/>
  <text x="593" y="446" class="label-text">CALL</text>

  <line x1="810" y1="408" x2="810" y2="478" stroke="#333" stroke-width="1.5" marker-end="url(#arrowSolid)"/>
  <text x="833" y="446" class="label-text">CALL</text>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Layer 5: External contracts -->
  <!-- ════════════════════════════════════════════════════════════ -->

  <!-- HubConfigurator -->
  <rect x="30" y="482" width="180" height="44" rx="8" fill="#e2e3e5" stroke="#999" stroke-width="1.5"/>
  <text x="120" y="504" class="box-text">HubConfigurator</text>

  <!-- SpokeConfigurator -->
  <rect x="245" y="482" width="190" height="44" rx="8" fill="#e2e3e5" stroke="#999" stroke-width="1.5"/>
  <text x="340" y="504" class="box-text">SpokeConfigurator</text>

  <!-- AccessManager -->
  <rect x="485" y="482" width="170" height="44" rx="8" fill="#e2e3e5" stroke="#999" stroke-width="1.5"/>
  <text x="570" y="504" class="box-text">AccessManager</text>

  <!-- PositionManager -->
  <rect x="720" y="482" width="180" height="44" rx="8" fill="#e2e3e5" stroke="#999" stroke-width="1.5"/>
  <text x="810" y="504" class="box-text">PositionManager</text>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Legend / Note -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <rect x="30" y="558" width="890" height="70" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>

  <!-- Legend items -->
  <line x1="50" y1="578" x2="100" y2="578" stroke="#333" stroke-width="1.5" marker-end="url(#arrowSolid)"/>
  <text x="110" y="578" class="note-text" dominant-baseline="central">CALL (solid)</text>

  <line x1="230" y1="578" x2="280" y2="578" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>
  <text x="290" y="578" class="note-text" dominant-baseline="central">DELEGATECALL (dashed)</text>

  <text x="50" y="605" class="note-text" dominant-baseline="central" font-style="italic">
    All code executes in the Governance Executor's context via delegatecall chain.
  </text>
  <text x="50" y="618" class="note-text" dominant-baseline="central" font-style="italic">
    Neither the ConfigEngine nor the sub-engines hold any storage, permissions, or admin keys.
  </text>
</svg>
